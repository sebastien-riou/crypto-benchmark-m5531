# A solution is a collection of related projects that share same base configuration.
solution:
  created-for: CMSIS-Toolbox@2.12.0
  cdefault: # use CMSIS-Toolbox default Compiler options

  # Compilers that can be selected
  select-compiler:
    - compiler: AC6
    - compiler: GCC
    - compiler: IAR
    - compiler: CLANG

  # List of miscellaneous tool-specific controls
  misc:
    - for-compiler: AC6 # GDB requires DWARF 5, remove when using uVision Debugger
      C-CPP:
        - -gdwarf-5
      ASM:
        - -gdwarf-5

  # List the packs that define the device and/or board.
  packs:
    - pack: Nuvoton::NuMicro_M5531_BSP
    - pack: Nuvoton::NuMicroM55_DFP
    - pack: ARM::CMSIS

  # List different hardware targets that are used to deploy the solution.
  target-types:
    - type: M5531H2LJAE
      board: NuMaker-M5531:V1.0
      device: M5531H2LJAE
      target-set:
        - set:
          images:
            - project-context: crypto-benchmark-m5531.Debug
          debugger:
            name: CMSIS-DAP@pyOCD
            port: 3333
            protocol: swd
            clock: 10000000

  # List of different build configurations.
  build-types:
    - type: Debug
      debug: on
      optimize: none

  #  - type: Release
  #    debug: off
  #    optimize: balanced

  # List related projects.
  projects:
    - project: crypto-benchmark-m5531/crypto-benchmark-m5531.cproject.yml
  compiler: GCC
