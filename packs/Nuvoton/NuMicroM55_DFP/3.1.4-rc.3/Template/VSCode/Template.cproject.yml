project:
  packs:
    - pack: ARM::CMSIS@^6.1.0
    - pack: Nuvoton::NuMicroM55_DFP
  setups:
    - output:
        # bin, elf, hex, lib
        type: bin
    - setup: Options for Template
      processor:
        fpu: dp
        mve: fp
        endian: little
        trustzone: "off"
      misc:
        - for-compiler: AC6
          C:
            - -std=c11
          C-CPP:
            - -fno-rtti -funsigned-char -fshort-enums -fshort-wchar -ffunction-sections -fdata-sections -Wall
            - -D__MICROLIB
          CPP:
            - -xc++
            - -std=c++11
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib --map --load_addr_map_info --xref --callgraph --symbols
            - --info sizes --info totals --info unused --info veneers
            - --strict --summary_stderr --info summarysizes
        - for-compiler: GCC
          C:
            - -std=gnu11
          C-CPP:
            - -mthumb -masm-syntax-unified -fmessage-length=0 -fsigned-char -ffunction-sections -fdata-sections
          Link:
            - -mthumb -fmessage-length=0 -fsigned-char --specs=nano.specs --specs=nosys.specs
            - -Wl,--gc-sections,-Map="$elf()$.map"
            - -Wl,--no-warn-rwx-segments
  groups:
    - group: User
      files:
        - file: ../main.c
  components:
    - component: ARM::CMSIS:CORE
    - component: Nuvoton::Device:Startup
    - component: Nuvoton::Device:StdDriver:Retarget
    - component: Nuvoton::Device:StdDriver:CLK
    - component: Nuvoton::Device:StdDriver:SYS
    - component: Nuvoton::Device:StdDriver:UART
