solution:
  created-by: uv2csolution@1.5.0
  created-for: CMSIS-Toolbox@2.9.0
  select-compiler:
    - compiler: AC6@>=5.19.0
    - compiler: GCC@>=10.3.1
  # List the packs that define the device and/or board.
  packs:
    - pack: Nuvoton::NuMicroM55_DFP@>=3.1.3-0
    - pack: ARM::CMSIS@^6.1.0
  build-types:
    - type: Release         # build-type name, used in context with: .Release
      optimize: balanced    # balanced optimization (size, speed, balanced, none, debug)
      debug: on             # generate debug info. for the release build (Set off to disable)
  target-types:
    - type: ARMCLANG
      compiler: AC6
      device: M55M1H2LJAE
    - type: GNUC
      compiler: GCC
      device: M55M1H2LJAE
  projects:
    - project: Template.cproject.yml
